# nextest config. See https://nexte.st/docs/configuration/
#
# The goals here are defense-in-depth alongside the per-test-binary
# watchdog in `crates/portl-agent/tests/common/mod.rs`:
#   - Catch individual hung tests at a finer granularity than the
#     30s process-abort watchdog.
#   - Fail fast on leaked subprocesses/threads after test completion.
#   - Run integration test binaries in parallel (nextest's default),
#     which `cargo test --workspace` does not.

[profile.default]
# If a single test runs longer than `period` with no output, emit a
# warning. After `terminate-after` periods, nextest SIGKILLs it. This
# fires BEFORE the 30s binary-level watchdog, so you get a specific
# test name in the failure output instead of a bare "process aborted".
slow-timeout = { period = "10s", terminate-after = 2, grace-period = "2s" }

# If a test finishes but leaves background tasks / child processes
# alive past this window, fail it. Catches iroh endpoints / spawned
# PTYs that outlive the test body.
leak-timeout = "2s"

# Fail the run quickly once something breaks, but still surface every
# failing test (default is 1 — we want the full picture).
fail-fast = false

# Show output inline from failed tests; keep successful tests quiet.
failure-output = "immediate-final"
success-output = "never"

# Retry flaky tests once. Most iroh-dependent tests are deterministic
# in-process; a single retry covers transient port-bind / mDNS races.
retries = { backoff = "fixed", count = 1, delay = "1s" }

[profile.ci]
# CI uses a stricter profile: no retries, JUnit output, longer slow
# timeout because CI machines are sometimes slower than laptops.
slow-timeout = { period = "20s", terminate-after = 2 }
retries = 0
fail-fast = false
failure-output = "immediate-final"
# Oversubscribe nextest threads to 24 (1.5× logical cpu count on this
# host). Many iroh-handshake tests spend ~4.5 s blocked on QUIC IO;
# more threads than cores lets short CPU-bound tests squeeze between
# the network waits. Upper bound on this host: ≥28 races
# `m3_cli::exec_exits_promptly_when_child_exits_with_stdin_idle`
# which is legitimately CPU-timing-sensitive.
test-threads = 24

# Per-test override for `udp_src_tag_lru_eviction`, which sweeps
# past the LRU cap (1024) by doing 1,025 sequential QUIC-datagram
# roundtrips. Each iteration touches the agent's per-src-tag code
# path (`route_to_target` in `crates/portl-agent/src/udp_registry.rs`),
# which holds `Mutex<UdpSessionInner>` across a `UdpSocket::bind`
# syscall and a `tokio::spawn` — legitimately ~40 ms per roundtrip
# on a 2-core runner, so ~45 s wall for the loop. Overridden here
# so we still fail fast on tests that aren't network-bound.
#
# `udp_burst_loopback_smoke` is NOT in this override: it has its
# own in-test `tokio::time::timeout(10s, recv)` so nextest's slow-
# timeout is irrelevant. Its failure mode is packet-loss
# detection, not slowness.
[[profile.ci.overrides]]
filter = 'test(=udp_src_tag_lru_eviction)'
slow-timeout = { period = "30s", terminate-after = 3 }

# `many_writers_converge_to_full_set` performs 1,000 persisted
# save() calls, and each save intentionally fsyncs a temp file before
# atomic rename to validate the alias-store durability contract.
# That makes it much slower than the rest of the unit suite in debug
# builds, especially on APFS and on shared CI runners.
[[profile.ci.overrides]]
filter = 'test(=alias_store::tests::many_writers_converge_to_full_set)'
slow-timeout = { period = "90s", terminate-after = 3 }
# 1000 serialized fsyncs on shared CI runners can drift into the 90s
# window; one retry absorbs disk-contention noise without masking real
# regressions.
retries = { backoff = "fixed", count = 1, delay = "5s" }

[profile.ci.junit]
path = "junit.xml"
