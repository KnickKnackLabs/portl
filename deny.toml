[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

[advisories]
version = 2
yanked  = "warn"
# Upstream `paste` is unmaintained but still pulled in transitively
# through `iroh -> netwatch -> netdev -> netlink-packet-*`. There is
# no safe alternative on the iroh side yet; the upstream migration
# to `pastey` or similar is tracked by netlink-packet-*.
# Revisit when iroh updates its netwatch dep chain.
# `portable-pty` currently pulls in the unmaintained `serial` crate on
# Unix. We need `portable-pty` for M3 shell support, and there is no safe
# replacement in its 0.8 line yet.
ignore  = ["RUSTSEC-2024-0436", "RUSTSEC-2017-0008"]

[licenses]
version    = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards         = "deny"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
