name: ci-e2e

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      # .cargo/config.toml sets `rustc-wrapper = "sccache"`. sccache is
      # installed by mozilla-actions/sccache-action below; this env var
      # tells sccache to use the GitHub Actions cache as its backend.
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      # Bulk dep cache for the e2e workflow. Shared with ci.yml's
      # native-target builds via the same `Cargo.lock` + rustc key;
      # `save-if: main` keeps PR branches from bloating the 10 GB budget.
      - uses: Swatinem/rust-cache@v2.8.2
        with:
          shared-key: "linux-native"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Cargo check
        run: env -u RUSTUP_TOOLCHAIN cargo check --workspace --all-features
      - name: Cargo test
        run: env -u RUSTUP_TOOLCHAIN cargo test --workspace --all-features
      - name: Cargo clippy
        run: env -u RUSTUP_TOOLCHAIN cargo clippy --workspace --all-features -- -D warnings
      - name: Build portl
        run: env -u RUSTUP_TOOLCHAIN cargo build --release --bin portl
      - name: Build reference image
        run: |
          mkdir -p adapters/docker-portl/images/bin
          cp target/release/portl adapters/docker-portl/images/bin/portl-amd64
          docker build \
            --platform linux/amd64 \
            -t portl-agent:ci \
            --build-arg TARGETARCH=amd64 \
            -f adapters/docker-portl/images/Dockerfile.reference \
            adapters/docker-portl/images/
      - name: Run docker adapter e2e smoke
        env:
          PORTL_HOME: /tmp/portl-home
        run: |
          export PORTL_HOME=$(mktemp -d)
          ./target/release/portl id new
          ./target/release/portl docker container add t1 --image portl-agent:ci
          ./target/release/portl docker container add t2 --image portl-agent:ci

          # ticket/v1 + shell/v1 via exec
          ./target/release/portl exec t1 -- echo hi
          ./target/release/portl exec t2 -- sh -c 'exit 42' && exit 1 || true

          # shell/v1 via PTY — use -c to avoid raw-mode issues in CI
          ./target/release/portl shell t1 -- -c 'ls /tmp' || true

          # tcp/v1 — start an http server in t1, forward, curl
          ./target/release/portl exec t1 -- sh -c '(python3 -m http.server 8080 &) && sleep 1' &
          sleep 2
          ./target/release/portl tcp t1 -L 127.0.0.1:18080:127.0.0.1:8080 &
          sleep 1
          curl -sSf http://127.0.0.1:18080/ || echo "tcp forward curl exit $?"

          # cleanup
          pkill -f "portl tcp" || true
          ./target/release/portl docker container rm t1 --force
          ./target/release/portl docker container rm t2 --force
