name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross linker (linux/arm64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'TOML'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          TOML
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin portl
      - name: Package
        run: |
          mkdir -p dist
          NAME="portl-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "staging/${NAME}"
          cp "target/${{ matrix.target }}/release/portl" "staging/${NAME}/portl"
          (cd "staging/${NAME}" && ln -sf portl portl-agent)
          cp LICENSE-MIT CHANGELOG.md "staging/${NAME}/"
          tar -C staging -czf "dist/${NAME}.tar.gz" "${NAME}"
          shasum -a 256 "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: portl-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: portl ${{ github.ref_name }}
          files: dist/*
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
