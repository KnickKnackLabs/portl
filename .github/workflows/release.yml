name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds use musl for a fully static binary that
          # runs on any glibc version, Alpine, distroless, etc.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            linux: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            linux: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install target toolchain (for the pinned rust-toolchain.toml)
        # rust-toolchain.toml pins the compiler; the `targets:` input
        # on the action above only adds targets to the *stable* alias,
        # which the pin overrides. Install against the pinned version
        # explicitly so musl / darwin cross-targets are available.
        run: rustup target add ${{ matrix.target }}
      - name: Install zig (linux only)
        if: matrix.linux
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild (linux only)
        if: matrix.linux
        run: cargo install --locked cargo-zigbuild
      - name: Build (linux musl via zigbuild)
        if: matrix.linux
        run: cargo zigbuild --release --target ${{ matrix.target }} --bin portl
      - name: Build (macOS native)
        if: matrix.linux != true
        run: cargo build --release --target ${{ matrix.target }} --bin portl
      - name: Package (tar.zst level 19)
        env:
          # Disable macOS AppleDouble metadata so tarballs produced on
          # the macos-latest runners stay clean when extracted on linux.
          COPYFILE_DISABLE: "1"
        run: |
          set -euo pipefail
          mkdir -p dist staging
          NAME="portl-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "staging/${NAME}"
          cp "target/${{ matrix.target }}/release/portl" "staging/${NAME}/portl"
          (cd "staging/${NAME}" && ln -sf portl portl-agent)
          cp LICENSE-MIT CHANGELOG.md "staging/${NAME}/"
          # --no-mac-metadata strips any remaining com.apple.* xattrs
          # on macos-latest runners; GNU tar on ubuntu-latest ignores
          # the flag silently, so the invocation is portable.
          tar_flags=(-C staging \
              --use-compress-program='zstd -19 -T0 --long' \
              -cf "dist/${NAME}.tar.zst" "${NAME}")
          if tar --help 2>&1 | grep -q -- --no-mac-metadata; then
              tar --no-mac-metadata "${tar_flags[@]}"
          else
              tar "${tar_flags[@]}"
          fi
          shasum -a 256 "dist/${NAME}.tar.zst" > "dist/${NAME}.tar.zst.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: portl-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: portl ${{ github.ref_name }}
          files: dist/*
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
