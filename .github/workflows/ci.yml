name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # .cargo/config.toml sets `rustc-wrapper = "sccache"`. Every cargo
  # invocation below needs sccache on PATH; mozilla-actions/sccache-
  # action installs it and wires the GitHub Actions cache backend via
  # this env var. `fmt` and `deny` don't invoke rustc, so they skip
  # the action.
  SCCACHE_GHA_ENABLED: "true"
  # Per-test-binary watchdog (see crates/portl-agent/tests/common/mod.rs).
  # Default is 30s for local laptops; CI runs on 2-CPU shared runners
  # under parallel test load, where UDP loopback stress tests can push
  # past the default. 90s is well above nextest's 40s per-test slow-
  # timeout, so the watchdog remains a true backstop rather than the
  # primary limit.
  PORTL_TEST_WATCHDOG_SECS: "90"

# Caching strategy (see docs/specs/ for context):
#  - `actions-rust-lang/setup-rust-toolchain` installs the toolchain
#    pinned in rust-toolchain.toml (1.89.0) and wraps
#    `Swatinem/rust-cache` so we get bulk dep caching (~/.cargo +
#    target/) keyed by Cargo.lock + rustc version. Fast restore on
#    the same lockfile.
#  - `mozilla-actions/sccache-action` installs sccache and points its
#    GHA backend at the Actions cache. Our `.cargo/config.toml` wires
#    `rustc-wrapper = "sccache"`, so every rustc invocation gets per-
#    compilation-unit caching on top of Swatinem's dep blob. sccache
#    survives lockfile churn and hits individual crates even when
#    the tree drifts.
#  - `cache-save-if: refs/heads/main` restricts cache writes to main
#    pushes; PR branches only read main's cache — keeps us under the
#    10 GB repo budget.
#  - `cache-on-failure: true` saves the cache even when the job
#    fails. Safe because Swatinem's pre-save clean strips workspace
#    crates + incremental artifacts; only successfully-compiled
#    deps survive. Gives warm-cache recovery on flaky test runs.
#
# Job topology:
#  - `test` compiles all-targets in test cfg → subsumes `cargo check`.
#  - `clippy` compiles all-targets with the clippy driver → also
#    subsumes `cargo check`. A dedicated `check` job would be a
#    strictly-weaker duplicate, so it is omitted.
#  - `fmt` and `deny` stay separate: neither invokes rustc, both
#    are <30 s, and they surface orthogonal red-X signals on PRs.

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      # cargo-nextest gives us per-test slow-timeout + terminate-after
      # (see .config/nextest.toml profile.ci). Failures include the
      # specific test name instead of a bare 'process aborted', and
      # integration test binaries run in parallel instead of serially.
      # Binary is cached by baptiste0928 action (~7 day expiry).
      - uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-nextest
          locked: true
      - run: cargo nextest run --profile ci --workspace --all-features

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # cargo fmt does not invoke rustc; skip the cache entirely and
      # only install rustfmt. Job finishes in ~15 s cold.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          cache: false
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  docker-smoke:
    name: docker integration smoke
    # Only run after the fast unit checks pass. No point rebuilding
    # a release binary + a Docker image if test or clippy is red;
    # this `needs:` makes e2e serial after the cheap gates.
    needs: [test, clippy]
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: mozilla-actions/sccache-action@v0.0.9
      # Shared with the `test` / `clippy` jobs via the same Cargo.lock
      # + rustc key — this job only rebuilds what's missing for
      # --release (release-profile artifacts).
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: "linux-native"
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build portl (release)
        run: cargo build --release --bin portl
      - name: Build reference Docker image
        run: |
          mkdir -p adapters/docker-portl/images/bin
          cp target/release/portl adapters/docker-portl/images/bin/portl-amd64
          docker build \
            --platform linux/amd64 \
            -t portl-agent:ci \
            --build-arg TARGETARCH=amd64 \
            -f adapters/docker-portl/images/Dockerfile.reference \
            adapters/docker-portl/images/
      - name: Docker adapter end-to-end smoke
        env:
          PORTL_HOME: /tmp/portl-home
        run: |
          export PORTL_HOME=$(mktemp -d)
          ./target/release/portl id new
          ./target/release/portl docker container add t1 --image portl-agent:ci
          ./target/release/portl docker container add t2 --image portl-agent:ci

          # ticket/v1 + shell/v1 via exec
          ./target/release/portl exec t1 -- echo hi
          ./target/release/portl exec t2 -- sh -c 'exit 42' && exit 1 || true

          # shell/v1 via PTY — use -c to avoid raw-mode issues in CI
          ./target/release/portl shell t1 -- -c 'ls /tmp' || true

          # tcp/v1 — start an http server in t1, forward, curl
          ./target/release/portl exec t1 -- sh -c '(python3 -m http.server 8080 &) && sleep 1' &
          sleep 2
          ./target/release/portl tcp t1 -L 127.0.0.1:18080:127.0.0.1:8080 &
          sleep 1
          curl -sSf http://127.0.0.1:18080/ || echo "tcp forward curl exit $?"

          # cleanup
          pkill -f "portl tcp" || true
          ./target/release/portl docker container rm t1 --force
          ./target/release/portl docker container rm t2 --force

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    # cargo-deny only reads Cargo.lock / Cargo.toml, but the underlying
    # `cargo metadata` call honors rust-toolchain.toml and the
    # rustc-wrapper from .cargo/config.toml. The rustc-wrapper is
    # cleared because sccache isn't installed in this job — cargo-deny
    # doesn't benefit from it and installing it here would waste time.
    # `cache: false` on setup-rust-toolchain skips Swatinem since
    # cargo-deny doesn't compile our workspace; baptiste0928/
    # cargo-install already caches the cargo-deny binary.
    env:
      CARGO_BUILD_RUSTC_WRAPPER: ""
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-deny
      - run: cargo deny --all-features check
