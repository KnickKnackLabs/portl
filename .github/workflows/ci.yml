name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # .cargo/config.toml sets `rustc-wrapper = "sccache"`. Every cargo
  # invocation below needs sccache on PATH; mozilla-actions/sccache-
  # action installs it and wires the GitHub Actions cache backend via
  # this env var. `fmt` and `deny` don't invoke rustc, so they skip
  # the action.
  SCCACHE_GHA_ENABLED: "true"

# Caching strategy (see docs/specs/ for context):
#  - Swatinem/rust-cache caches ~/.cargo + target/ as bulk blobs, keyed
#    by Cargo.lock + rustc version. Fast restore on same lockfile.
#  - sccache caches per-rustc-invocation output via the GHA cache
#    backend. Survives lockfile churn; hits individual crates even
#    when the tree drifts.
#  - Both together: Swatinem wins on warm branches; sccache wins
#    on fresh lockfiles and cross-branch propagation.
#  - `save-if: ${{ github.ref == 'refs/heads/main' }}` restricts
#    writes to main, so PR branches only read main's cache — keeps
#    us comfortably under the 10 GB repo budget.
#  - `cache-on-failure: true` saves the cache even when the job
#    fails. Safe because Swatinem's pre-save clean strips workspace
#    crates + incremental artifacts; only successfully-compiled
#    deps survive. Gives warm-cache recovery on flaky test runs.
#
# Job topology:
#  - `test` compiles all-targets in test cfg → subsumes `cargo check`.
#  - `clippy` compiles all-targets with the clippy driver → also
#    subsumes `cargo check`. A dedicated `check` job would be a
#    strictly-weaker duplicate, so it is omitted.
#  - `fmt` and `deny` stay separate: neither invokes rustc, both
#    are <30 s, and they surface orthogonal red-X signals on PRs.

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2.8.2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo test --workspace --all-features

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    # cargo fmt does not invoke rustc, so sccache is not needed and the
    # wrapper would never be consulted.
    env:
      CARGO_BUILD_RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2.8.2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
