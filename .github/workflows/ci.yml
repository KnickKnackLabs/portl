name: CI

on:
  push:
    branches: [main]
    # Tag pushes run the full CI suite + release-build + release-publish.
    # The release jobs at the bottom of this file are gated on all
    # lint / test / smoke jobs being green, so we can't publish an
    # artifact from a tag that doesn't pass CI.
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # .cargo/config.toml sets `rustc-wrapper = "sccache"`. Every cargo
  # invocation below needs sccache on PATH; mozilla-actions/sccache-
  # action installs it and wires the GitHub Actions cache backend via
  # this env var. `fmt` and `deny` don't invoke rustc, so they skip
  # the action.
  SCCACHE_GHA_ENABLED: "true"
  # Per-test-binary watchdog (see crates/portl-agent/tests/common/mod.rs).
  # Default is 30s for local laptops; CI runs on 2-CPU shared runners
  # under parallel test load, where UDP loopback stress tests can push
  # past the default. 90s is well above nextest's 40s per-test slow-
  # timeout, so the watchdog remains a true backstop rather than the
  # primary limit.
  PORTL_TEST_WATCHDOG_SECS: "90"

# Caching strategy (see docs/specs/ for context):
#  - `actions-rust-lang/setup-rust-toolchain` installs the toolchain
#    pinned in rust-toolchain.toml (1.89.0) and wraps
#    `Swatinem/rust-cache` so we get bulk dep caching (~/.cargo +
#    target/) keyed by Cargo.lock + rustc version. Fast restore on
#    the same lockfile.
#  - `mozilla-actions/sccache-action` installs sccache and points its
#    GHA backend at the Actions cache. Our `.cargo/config.toml` wires
#    `rustc-wrapper = "sccache"`, so every rustc invocation gets per-
#    compilation-unit caching on top of Swatinem's dep blob. sccache
#    survives lockfile churn and hits individual crates even when
#    the tree drifts.
#  - `cache-save-if: refs/heads/main` restricts cache writes to main
#    pushes; PR branches only read main's cache — keeps us under the
#    10 GB repo budget.
#  - `cache-on-failure: true` saves the cache even when the job
#    fails. Safe because Swatinem's pre-save clean strips workspace
#    crates + incremental artifacts; only successfully-compiled
#    deps survive. Gives warm-cache recovery on flaky test runs.
#
# Job topology:
#  - `test` compiles all-targets in test cfg → subsumes `cargo check`.
#  - `clippy` compiles all-targets with the clippy driver → also
#    subsumes `cargo check`. A dedicated `check` job would be a
#    strictly-weaker duplicate, so it is omitted.
#  - `fmt` and `deny` stay separate: neither invokes rustc, both
#    are <30 s, and they surface orthogonal red-X signals on PRs.

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      # cargo-nextest gives us per-test slow-timeout + terminate-after
      # (see .config/nextest.toml profile.ci). Failures include the
      # specific test name instead of a bare 'process aborted', and
      # integration test binaries run in parallel instead of serially.
      #
      # taiki-e/install-action downloads prebuilt nextest binaries
      # from the nexte.st CDN — no `cargo install` compile step, so
      # no MSRV coupling between our pinned 1.89 toolchain and
      # nextest's own MSRV. Takes ~5 s vs minutes for a cold
      # source build.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --profile ci --workspace --all-features

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # cargo fmt does not invoke rustc; skip the cache entirely and
      # only install rustfmt. Job finishes in ~15 s cold.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          cache: false
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - name: Forbid unwrapped spawn_blocking in portl-agent
        run: |
          set -u
          uv run --isolated python - <<'PY'
          from pathlib import Path
          import sys

          offenders = []
          for path in Path("crates/portl-agent").rglob("*.rs"):
              lines = path.read_text().splitlines()
              for i, line in enumerate(lines):
                  if "spawn_blocking" not in line:
                      continue
                  start = max(0, i - 3)
                  end = min(len(lines), i + 4)
                  if not any("slow_task" in candidate for candidate in lines[start:end]):
                      offenders.append(f"{path}:{i + 1}: {line.strip()}")
          if offenders:
              print("::error ::every portl-agent spawn_blocking callsite must be wrapped with slow_task")
              print("\n".join(offenders))
              sys.exit(1)
          print("OK: all portl-agent spawn_blocking callsites are wrapped with slow_task")
          PY

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    # cargo-deny only reads Cargo.lock / Cargo.toml, but the underlying
    # `cargo metadata` call honors rust-toolchain.toml and the
    # rustc-wrapper from .cargo/config.toml. The rustc-wrapper is
    # cleared because sccache isn't installed in this job — cargo-deny
    # doesn't benefit from it and installing it here would waste time.
    # `cache: false` on setup-rust-toolchain skips Swatinem since
    # cargo-deny doesn't compile our workspace; baptiste0928/
    # cargo-install already caches the cargo-deny binary.
    env:
      CARGO_BUILD_RUSTC_WRAPPER: ""
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      # Prebuilt cargo-deny binary from GitHub releases; avoids
      # compiling from source with our pinned toolchain.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny --all-features check

  dep-guard:
    name: dep-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Forbid rusqlite / libsqlite3-sys
        run: |
          set -u
          if cargo tree --workspace -e normal \
               | grep -iE 'rusqlite|libsqlite3-sys'; then
            echo "::error ::rusqlite / libsqlite3-sys must not be in the workspace dep tree (v0.1.2 carve-out)"
            exit 1
          fi
          echo "OK: rusqlite absent from workspace"

  docker-smoke:
    name: docker integration smoke
    # Only run after the fast unit checks pass. No point rebuilding
    # a release binary + a Docker image if test or clippy is red;
    # this `needs:` makes e2e serial after the cheap gates.
    needs: [test, clippy]
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: mozilla-actions/sccache-action@v0.0.9
      # Shared with the `test` / `clippy` jobs via the same Cargo.lock
      # + rustc key — this job only rebuilds what's missing for
      # --release (release-profile artifacts).
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: "linux-native"
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build portl (release)
        run: cargo build --release --bin portl
      - name: Build reference Docker image
        run: |
          mkdir -p adapters/docker-portl/images/bin
          cp target/release/portl adapters/docker-portl/images/bin/portl-amd64
          docker build \
            --platform linux/amd64 \
            -t portl-agent:ci \
            --build-arg TARGETARCH=amd64 \
            -f adapters/docker-portl/images/Dockerfile.reference \
            adapters/docker-portl/images/
      - name: Docker adapter end-to-end smoke
        env:
          PORTL_HOME: /tmp/portl-home
        run: |
          export PORTL_HOME=$(mktemp -d)
          ./target/release/portl init
          ./target/release/portl docker run portl-agent:ci --name t1
          ./target/release/portl docker run portl-agent:ci --name t2

          # ticket/v1 + shell/v1 via exec
          ./target/release/portl exec t1 -- echo hi
          ./target/release/portl exec t2 -- sh -c 'exit 42' && exit 1 || true

          # shell/v1 smoke via a simple non-PTY exec in CI
          ./target/release/portl exec t1 -- sh -lc 'ls /tmp' || true

          # tcp/v1 — start an http server in t1, forward, curl
          ./target/release/portl exec t1 -- sh -c '(python3 -m http.server 8080 &) && sleep 1' &
          sleep 2
          ./target/release/portl tcp t1 -L 127.0.0.1:18080:127.0.0.1:8080 &
          sleep 1
          curl -sSf http://127.0.0.1:18080/ || echo "tcp forward curl exit $?"

          # cleanup
          pkill -f "portl tcp" || true
          ./target/release/portl docker rm t1 --force
          ./target/release/portl docker rm t2 --force

  # ─────────────────────────── Release jobs ───────────────────────────
  # Fire only on tag pushes (v*). Gated on every CI job above being
  # green, so we can't publish an artifact from a tag that fails
  # tests, clippy, fmt, deny, or docker smoke. The cross-compile
  # matrix is expensive (~5-10 min); `if: startsWith(github.ref,
  # 'refs/tags/v')` prevents it running on main pushes and PRs.

  release-build:
    name: release build (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, clippy, fmt, deny, dep-guard, docker-smoke]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds use musl for a fully static binary that runs
          # on any glibc version, Alpine, distroless, etc.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            linux: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            linux: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: mozilla-actions/sccache-action@v0.0.9
      # Per-target cache. `shared-key: release-<target>` so successive
      # release tags (v0.1.1 → v0.1.2 → …) warm-start each other on the
      # same target. First release on a new target is cold; after
      # that, same-target releases benefit. Cross-target sharing is
      # impossible because rustc output differs per target triple.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-shared-key: "release-${{ matrix.target }}"
          cache-save-if: ${{ startsWith(github.ref, 'refs/tags/v') }}
          cache-on-failure: true
      - name: Install zig (linux only)
        if: matrix.linux
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild (linux only)
        # taiki-e/install-action downloads the prebuilt cargo-zigbuild
        # binary — ~5 s vs ~1 min source build, decoupled from our
        # pinned 1.89 toolchain.
        if: matrix.linux
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: Build (linux musl via zigbuild)
        if: matrix.linux
        run: cargo zigbuild --release --target ${{ matrix.target }} --bin portl
      - name: Build (macOS native)
        if: matrix.linux != true
        run: cargo build --release --target ${{ matrix.target }} --bin portl
      - name: Package (tar.zst level 19)
        env:
          # Disable macOS AppleDouble metadata so tarballs produced on
          # the macos-latest runners stay clean when extracted on linux.
          COPYFILE_DISABLE: "1"
        run: |
          set -euo pipefail
          mkdir -p dist staging
          NAME="portl-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "staging/${NAME}"
          cp "target/${{ matrix.target }}/release/portl" "staging/${NAME}/portl"
          (
            cd "staging/${NAME}"
            ln -sf portl portl-agent
            ln -sf portl portl-gateway
            test -L portl-agent
            test -L portl-gateway
          )
          cp LICENSE-MIT CHANGELOG.md "staging/${NAME}/"
          # --no-mac-metadata strips any remaining com.apple.* xattrs
          # on macos-latest runners; GNU tar on ubuntu-latest ignores
          # the flag silently, so the invocation is portable.
          tar_flags=(-C staging \
              --use-compress-program='zstd -19 -T0 --long' \
              -cf "dist/${NAME}.tar.zst" "${NAME}")
          if tar --help 2>&1 | grep -q -- --no-mac-metadata; then
              tar --no-mac-metadata "${tar_flags[@]}"
          else
              tar "${tar_flags[@]}"
          fi
          # Write the shasum with a path-less filename so users can
          # `sha256sum -c ...sha256` next to the tarball without
          # recreating a dist/ directory.
          (cd dist && shasum -a 256 "${NAME}.tar.zst" > "${NAME}.tar.zst.sha256")
      - uses: actions/upload-artifact@v5
        with:
          name: portl-${{ matrix.target }}
          path: dist/*

  release-publish:
    name: publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: portl ${{ github.ref_name }}
          files: dist/*
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
