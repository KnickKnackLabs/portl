# Workspace-wide cargo configuration.
#
# Contains a mix of cache-safe knobs (aliases, env passthroughs) and
# cache-invalidating ones (`RUSTC_WRAPPER`, `[profile.*]` overrides). The
# latter trigger a one-time full rebuild on first use, with compounding
# wins on every subsequent fresh target / branch switch / CI job.
#
# Cache-invalidating knobs deliberately live in this file so the rebuild
# happens once at commit time, not silently on contributor machines.

[alias]
# Hot-loop shortcuts. `nt` is the default everyday runner.
nt          = "nextest run --workspace --no-fail-fast"
nt-unit     = "nextest run --workspace --lib --bins --no-fail-fast"
nt-int      = "nextest run --workspace --test '*' --no-fail-fast"
check-all   = "check --workspace --all-targets"
clippy-all  = "clippy --workspace --all-targets"

[build]
# Compiler-output caching. Hits recycle rustc output across fresh
# target dirs, CI runners, and branch switches. Cache misses add
# ~50–100ms per crate; hits save whole rustc invocations. sccache is
# pinned via mise.toml; set SCCACHE_DIR / SCCACHE_CACHE_SIZE in the
# shell environment to tune location and footprint (defaults:
# ~/Library/Caches/Mozilla.sccache, 10G).
rustc-wrapper = "sccache"

[profile.dev.package."*"]
# Cut debuginfo fidelity for every crate (workspace + deps) from the
# dev-profile default of "full" to line tables only. Keeps file/line
# numbers in backtraces, drops variable/type info that lldb `p`/`v`
# commands need — a trade most devs won't notice day to day, and one
# that substantially shrinks dSYM generation and link time on macOS.
# Override locally with `CARGO_PROFILE_DEV_PACKAGE_*_DEBUG=full` when
# debugging with lldb.
debug = "line-tables-only"

[env]
# Keep the per-test-binary watchdog default visible to agents/CI even when
# invoking `cargo test` directly (the Rust code also defaults to 30s).
# Overridable per-invocation via the shell environment.
PORTL_TEST_WATCHDOG_SECS = { value = "30", force = false }
