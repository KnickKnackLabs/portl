[package]
name         = "portl-cli"
version.workspace      = true
edition.workspace      = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
rust-version.workspace = true
description  = "portl CLI — single multicall binary for `portl` (operator) and `portl agent` (target-side)."

[lints]
workspace = true

[[bin]]
name = "portl"
path = "src/main.rs"

[dependencies]
portl-core  = { version = "0.0.1", path = "../portl-core" }
portl-proto = { version = "0.0.1", path = "../portl-proto" }
clap        = { workspace = true }
tokio       = { workspace = true }
anyhow      = { workspace = true }
thiserror   = { workspace = true }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true }
